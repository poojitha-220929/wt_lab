<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Smart Kisan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    
    <div class="login-card">
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 1.8rem;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                SMART KISAN
            </a>
        </div>
        
        <h2>Create Account</h2>
        <p>Join our farming community</p>

        <form action="register.php" method="POST">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" class="form-control" placeholder="Enter full name" required>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem; padding: 0.85rem; font-size: 1.1rem;">Sign Up</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-light); font-size: 0.95rem;">
            <p>Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login</a></p>
            <a href="index.html" style="color: var(--primary); font-weight: 500; text-decoration: none; margin-top: 1rem; display: inline-block; transition: all 0.3s;">&larr; Back to Home</a>
        </div>
    </div>

</body>
</html>
